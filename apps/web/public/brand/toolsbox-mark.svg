<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ToolsBox">
  <defs>
    <!-- Frame stroke gradient: cyan -> emerald -->
    <linearGradient id="tbFrame" x1="8" y1="8" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Inner panel fill gradient -->
    <linearGradient id="tbFill" x1="20" y1="20" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Accent dot radial glow -->
    <radialGradient id="tbDotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft outer glow filter for the frame -->
    <filter id="tbGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer rounded square frame -->
  <rect x="6" y="6" width="116" height="116" rx="26"
        fill="#0a0f17"
        stroke="url(#tbFrame)"
        stroke-width="2.5"/>

  <!-- Inner panel: subtle gradient + hairline border -->
  <rect x="14" y="14" width="100" height="100" rx="20"
        fill="url(#tbFill)"
        stroke="rgba(34, 211, 238, 0.22)"
        stroke-width="0.6"/>

  <!-- Top-left console status dots -->
  <circle cx="24" cy="24" r="1.6" fill="rgba(34, 211, 238, 0.7)"/>
  <circle cx="32" cy="24" r="1.6" fill="rgba(34, 211, 238, 0.7)"/>
  <circle cx="40" cy="24" r="1.6" fill="rgba(34, 211, 238, 0.7)"/>

  <!-- Faint vertical guides (module feel) -->
  <line x1="64" y1="40" x2="64" y2="92" stroke="rgba(34, 211, 238, 0.10)" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="40" y1="64" x2="88" y2="64" stroke="rgba(34, 211, 238, 0.10)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Bracket-and-slash glyph </> -->
  <g filter="url(#tbGlow)">
    <!-- Left bracket < -->
    <path d="M 52 46 L 36 64 L 52 82"
          stroke="url(#tbFrame)"
          stroke-width="5"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Right bracket > -->
    <path d="M 76 46 L 92 64 L 76 82"
          stroke="url(#tbFrame)"
          stroke-width="5"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Slash / through center -->
    <path d="M 72 40 L 56 88"
          stroke="url(#tbFrame)"
          stroke-width="5"
          stroke-linecap="round"/>
  </g>

  <!-- Bottom-right live status dot with glow halo -->
  <circle cx="98" cy="98" r="8" fill="url(#tbDotGlow)"/>
  <circle cx="98" cy="98" r="3" fill="#34d399"/>
</svg>
